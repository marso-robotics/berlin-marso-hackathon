# Root config. Composes a difficulty (defaults list) + shared params.
# Override anything on the CLI, e.g.  python eval.py difficulty=hard checkpoint=<path>
defaults:
  - difficulty: easy
  - _self_

seed: 0
num_envs: 8               # for eval/test; scale up as GPU allows
device: cuda
control_mode: pd_ee_delta_pos
max_episode_steps: 200

# observation mode (locked to difficulty default at eval time)
obs_mode: ${difficulty.obs_mode}

camera:
  width: 128
  height: 128

# the rgb obs comes from a single fixed third-person "scene" camera (the only image input)
obs_camera: scene

# checkpoint path (for eval.py / test.py)
checkpoint: null
# eval config file path (eval.py only)
eval_config: null
# policy entrypoint "module:function" — required for eval.py / test.py
# e.g.  policy=warehouse_sort.il_policy:load_dp
policy: null
