# @package _global_
# HARD — generalisation level. 6 parcels, all randomisation axes active (narrow training
# ranges from randomization/train.yaml). Bin sides may swap between episodes.
# obs_mode: state (main track default). Use obs_mode=rgb override for the image track.
defaults:
  - /randomization: train          # pulls the narrow training ranges into `randomization`
  - _self_

difficulty:
  name: hard
  num_parcels: 6
  fixed_poses: false
  obs_mode: state
