# @package _global_
# EASY — plumbing check (not a demo level). State obs, fixed poses, zero randomisation.
difficulty:
  name: easy
  num_parcels: 2
  fixed_poses: true
  obs_mode: state

# All randomisation axes present in the schema but set to zero/empty (deterministic).
randomization:
  parcel_pose:
    xy_jitter: [0.0, 0.0]
    yaw_jitter: [0.0, 0.0]
  bin_position:
    side_swap_prob: 0.0
    xy_jitter: [0.0, 0.0]
  lighting:
    intensity: [1.0, 1.0]
    direction_jitter: [0.0, 0.0]
  background:
    table_colors: [[0.30, 0.30, 0.32]]
    floor_colors: [[0.20, 0.20, 0.22]]
  appearance:
    cardboard_shade: [0.0, 0.0]
    tag_shade: [0.0, 0.0]
  clutter:
    enabled: false
    contact_ok: false
