# @package _global_
# SIMPLE — short-horizon ablation of the sort task (SimpleSort-v1): ONE red parcel, two bins
# (red + blue), pick-and-place into the red box then return home. State obs, fixed poses, no
# randomisation. Uses the SAME train/test/eval harness; only the env_id changes.
env_id: SimpleSort-v1
max_episode_steps: 80          # single pick-place-return is short (PickCube uses 50)

difficulty:
  name: simple
  num_parcels: 1
  fixed_poses: true
  obs_mode: state

# SimpleSort-v1 ignores randomisation (deterministic), but the harness still references this
# block — keep it present and zeroed.
randomization:
  parcel_pose:
    xy_jitter: [0.0, 0.0]
    yaw_jitter: [0.0, 0.0]
  bin_position:
    side_swap_prob: 0.0
    xy_jitter: [0.0, 0.0]
  lighting:
    intensity: [1.0, 1.0]
    direction_jitter: [0.0, 0.0]
  background:
    table_colors: [[0.30, 0.30, 0.32]]
    floor_colors: [[0.20, 0.20, 0.22]]
  appearance:
    cardboard_shade: [0.0, 0.0]
    tag_shade: [0.0, 0.0]
  clutter:
    enabled: false
    contact_ok: false
