# Hydra config for the IL training dispatcher (il/train.py).
# Pick a method with method=... and override any hyperparameter on the CLI, e.g.
#   pixi run python il/train.py                              # default: dp (state DP, recommended)
#   pixi run python il/train.py method=dp_rgb               # RGB DP (template, not yet solving)
#   pixi run python il/train.py method=dp flags.total_iters=8000 flags.eval_freq=4000
defaults:
  - _self_
  - method: dp   # method config (@package _global_) overrides the shared defaults above
                 # (e.g. dp_medium sets demo_dir=medium, max_episode_steps=400)

# shared across all methods
env_id: WarehouseSort-v1
control_mode: pd_ee_delta_pos
sim_backend: gpu
max_episode_steps: 200
demo_dir: easy                  # which il/demos/<dir> dataset to train on
demo_path: null                 # null -> auto (state/rgb dataset chosen by method.demo_kind)

hydra:
  output_subdir: null
  run:
    dir: .
