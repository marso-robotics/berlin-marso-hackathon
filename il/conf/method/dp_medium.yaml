# @package _global_
# State Diffusion Policy on MEDIUM (4 parcels, randomised poses, 2 bins). Learnability probe.
# The eval env auto-matches the demo distribution (randomisation read from the demo json).
baseline_dir: diffusion_policy
script: train.py
demo_kind: state
demo_dir: medium
max_episode_steps: 400
flags:
  total_iters: 30000
  batch_size: 256
  obs_horizon: 2
  act_horizon: 8
  pred_horizon: 16
  num_eval_envs: 4
  num_eval_episodes: 16
  eval_freq: 5000
  log_freq: 1000
  save_freq: 10000
  capture_video: true
  exp_name: warehouse_state_dp_medium
